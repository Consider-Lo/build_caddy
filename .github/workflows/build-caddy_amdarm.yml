name: Build AMD64ARM64 Caddy
on: 
#  push:
#    branches: [ main ]
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goamd64: v3      # 针对现代云服务器优化
          - goarch: arm64
            goamd64: v1      # ARM 架构不使用此参数

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy with Plugins
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}
        run: |
          # 使用重定向语法修复 klzgrad/forwardproxy 编译报错
          xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddyserver/forwardproxy=github.com/klzgrad/forwardproxy@8563441787288fb82379918a354c0c355b5fd83c

      - name: Package Binary
        run: |
          # 给予执行权限并重命名
          chmod +x caddy
          mv caddy caddy-linux-${{ matrix.goarch }}
          # 打包为 tar.gz 以保留 Linux 权限位
          tar -czvf caddy-linux-${{ matrix.goarch }}.tar.gz caddy-linux-${{ matrix.goarch }}

      # 发布到 Release 页面
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          # 定义 Release 的标签（Tag），可以使用日期
          tag_name: caddy-pqc-${{ github.run_number }}
          name: "Caddy Custom Build (PQC Support) - Run ${{ github.run_number }}"
          body: |
            这是自动编译的自定义 Caddy 二进制文件。
            - 包含插件: forwardproxy-naive, cloudflare-dns
            - 支持特性: X25519MLKEM768 (抗量子加密)
            - 编译环境: Go 1.23
          draft: false
          prerelease: false
          # 指定要上传的文件（支持通配符）
          files: |
            caddy-linux-${{ matrix.goarch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
